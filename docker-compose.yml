services:
  web:
    build: ./devshub_project
    container_name: devshub-app
    volumes:
      - ./devshub_project:/code
    depends_on:
      - postgres
      - redis
      - rabbitmq
  postgres:
    image: postgres:18.3
    container_name: postgres-db
    env_file:
      - ./devshub_project/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/18/docker
  redis:
    image: redis:8.6.1
    container_name: redis-cache
    ports:
      - "6379:6379"
  rabbitmq:
    image: rabbitmq:4.2.3-management
    container_name: rabbitmq-broker
    env_file:
      - ./devshub_project/.env
    ports:
      - "5672:5672"
      - "15672:15672"
  nginx:
    image: nginx:1.29.7
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./devshub_project/staticfiles:/static
      - ./devshub_project/media:/media
    depends_on:
      - web

  celery_worker:
    build: ./devshub_project
    container_name: celery-worker
    command: celery -A devshub worker --loglevel=info
    volumes:
      - ./devshub_project:/code
    depends_on:
      - postgres
      - redis
      - rabbitmq

  celery_beat:
    build: ./devshub_project
    container_name: celery-beat
    command: celery -A devshub beat --loglevel=info
    volumes:
      - ./devshub_project:/code
    depends_on:
      - postgres
      - redis
      - rabbitmq

volumes:
  postgres-data:
