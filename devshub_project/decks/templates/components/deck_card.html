<div class="p-4 flex flex-col gap-2 text-gray-700 rounded-lg border-2 border-gray-200">

  <!-- Deck title -->
  <div>
    <a href="{{ deck.get_absolute_url }}" class="hover:text-blue-600 active:text-blue-600 transition-colors">
      {{ deck.title|truncatechars:76|striptags }}
    </a>
  </div>

  <!-- Deck author -->
  <div>
    <a href="{{ deck.author.get_absolute_url }}" class="group">
      Автор: <span class="font-medium group-hover:text-blue-600 active:text-blue-600">{{ deck.author }}</span>
    </a>
  </div>

  <!-- Deck status -->
  <div class="w-full">

    <!-- Toggle study button -->
    {% if is_owner %}
      <form action="{% url "deck-toggle-study" deck.pk %}" method="post" data-js-toggle-save-form>
        {% csrf_token %}
        {% if not deck.is_studying %}
          <button type="submit" data-js-toggle-button class="w-full rounded-full py-2 px-4 primary transition-colors cursor-pointer">
            Добавить в изучаемые
          </button>
        {% else %}
          <button type="submit" data-js-toggle-button class="w-full rounded-full py-2 px-4 danger transition-colors cursor-pointer">
            Удалить из изучаемых
          </button>
        {% endif %}
      </form>
    {% endif %}

    <!-- Status -->
    {% if not is_owner %}
      {% if is_author %}
        <span class="inline-block sm:max-w-28 w-full text-center rounded-full py-1 px-2 primary transition-colors hover:bg-blue-50">Вы автор</span>
      {% elif deck.is_saved %}
        <span class="inline-block sm:max-w-28 w-full text-center rounded-full py-1 px-2 success transition-colors hover:bg-green-50">Сохранена</span>
      {% else %}
        <span class="inline-block sm:max-w-28 w-full text-center rounded-full py-1 px-2 warning transition-colors hover:bg-orange-50">Новая</span>
      {% endif %}
    {% endif %}

  </div>

</div>
